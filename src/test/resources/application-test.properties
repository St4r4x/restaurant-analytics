# application-test.properties — Safe test values, no production secrets
# Activated when spring.profiles.active=test or @ActiveProfiles("test")

# JWT — 64-char dummy secret, safe for test use only
jwt.secret=test-only-jwt-secret-64chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Datasource — localhost for tests without Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurantdb
spring.datasource.username=restaurant
spring.datasource.password=restaurant

# Redis — localhost for tests
redis.host=localhost
redis.port=6379

# Signup codes — empty (disabled) for tests
controller.signup.code=
admin.signup.code=

# NYC API — limit to 1000 records in tests to avoid full 90k pull
nyc.api.max_records=1000
