# Test profile — ApplicationContextInitializer (UserRepositoryIT.Initializer) overrides
# spring.datasource.url / username / password with the TC container values at context creation.
# These defaults are placeholders; they will never be used when the Initializer is active.

spring.datasource.url=jdbc:postgresql://localhost:5432/restaurantdb
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate create the schema in the TC container.
# Use "create" not "create-drop": with @ClassRule, TC stops the container at the
# end of the test class before Spring's SessionFactory shutdown hook fires for DDL drop.
# "create-drop" causes StackOverflowError in GenerationTargetToDatabase when the
# container is already stopped during schema drop. "create" skips the drop-on-close.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# MongoDB placeholder — overridden by System.setProperty("mongodb.uri", ...) in UserRepositoryIT static block
mongodb.uri=mongodb://localhost:27017
mongodb.database=newyork
mongodb.collection=restaurants

# Redis — no TC container; RestaurantCacheService is NOT mocked.
# Lettuce connects lazily — no Redis connection is attempted during these JPA-only tests.
redis.host=localhost
redis.port=6379
redis.cache.ttl-seconds=3600
redis.top.limit=10

# JWT
jwt.secret=a_very_long_32_bytes_minimum_secret_with_extra_chars_123456
jwt.access.expiration.ms=900000
jwt.refresh.expiration.ms=604800000
