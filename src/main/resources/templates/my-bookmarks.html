<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookmarks — NYC Restaurant Inspector</title>
    <th:block th:replace="fragments/ux-utils :: ux-utils"></th:block>
    <style>
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8f5f0;
        color: #1a1a1a;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .page-header {
        background: #1a1a1a;
        color: white;
        padding: 32px 0;
      }

      .page-header .eyebrow {
        font-size: 0.7em;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #c0392b;
        margin-bottom: 8px;
      }

      .page-header h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 2.2em;
        font-weight: 900;
        margin: 0;
      }

      .container {
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 16px;
      }
      .content-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .content-card {
        background: white;
        border: 1px solid #e8e0d8;
        padding: 24px;
        margin-bottom: 16px;
      }

      .content-card h2 {
        margin: 0 0 16px 0;
        font-size: 1.1em;
        font-weight: 600;
        color: #1a1a1a;
      }

      .top-restaurant-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #f0ebe3;
      }

      .top-restaurant-item:last-child {
        border-bottom: none;
      }

      .top-restaurant-item:hover {
        background: #faf7f4;
      }

      .top-restaurant-item > div:first-child {
        flex: 1;
        min-width: 0;
      }

      .top-restaurant-item .restaurant-name {
        font-weight: 600;
        font-size: 0.9em;
        color: #1a1a1a;
      }

      .top-restaurant-item .restaurant-borough {
        font-size: 0.82em;
        color: #999;
        margin-top: 2px;
      }

      .btn-bookmark {
        min-width: 36px;
        min-height: 36px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1em;
        color: #f5a623;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-view {
        text-decoration: none;
        color: #c0392b;
        font-weight: 600;
        font-size: 0.78em;
        white-space: nowrap;
      }

      .btn-view:hover {
        color: #a02d24;
      }

      .civic-footer {
        background: #1a1a1a;
        color: rgba(255, 255, 255, 0.45);
        padding: 24px 0;
        font-size: 0.78em;
        border-top: 1px solid #2a2a2a;
      }

      .civic-footer .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .empty-state {
        color: #999;
        font-size: 0.9em;
        padding: 32px 0;
        text-align: center;
      }

      .empty-state a {
        color: #c0392b;
        font-weight: 600;
        text-decoration: none;
      }

      .empty-state a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="page-header">
      <div class="container">
        <div class="eyebrow">Your Account</div>
        <h1>My Bookmarks</h1>
      </div>
    </div>

    <div style="padding: 32px 0; flex: 1;">
      <div class="content-container">
        <div class="content-card" id="bookmarks-card">
          <div id="bookmarks-list">
            <div class="skel" style="height:52px;border-radius:2px;margin-bottom:8px"></div>
            <div class="skel" style="height:52px;border-radius:2px;margin-bottom:8px"></div>
            <div class="skel" style="height:52px;border-radius:2px;margin-bottom:8px"></div>
          </div>
          <div id="pagination-controls" style="margin-top:8px"></div>
        </div>
      </div>
    </div>

    <footer class="civic-footer">
      <div class="container">
        <div>NYC Restaurant Inspector · Data from NYC Open Data</div>
      </div>
    </footer>

    <script>
      // ── Pagination state ─────────────────────────────────────────────
      var allBookmarks = [];
      var currentPage = 0;
      var PAGE_SIZE = 20;

      // ── Auth ─────────────────────────────────────────────────────────
      function getAuthHeaders() {
        const token = localStorage.getItem("accessToken");
        if (!token) return { "Content-Type": "application/json" };
        return {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        };
      }

      function handleFetchErrorResponse(response) {
        if (response.status === 401 || response.status === 403) {
          localStorage.removeItem("accessToken");
          localStorage.removeItem("refreshToken");
          window.location.href = "/login";
          throw new Error("Non autorisé");
        }
        return response;
      }

      function fetchWithAuth(url, options) {
        options = options || {};
        options.headers = Object.assign({}, getAuthHeaders(), options.headers || {});
        return fetch(url, options).then(handleFetchErrorResponse);
      }

      // ── Bookmarks ────────────────────────────────────────────────────
      function gradeBadgeHtml(grade) {
        const g = grade || '—';
        let bg = '#ffebee', color = '#b71c1c';
        if (g === 'A') { bg = '#e8f5e9'; color = '#2e7d32'; }
        else if (g === 'B') { bg = '#fff8e1'; color = '#f57f17'; }
        return '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-weight:700;font-size:0.82em;background:' + bg + ';color:' + color + '">' + g + '</span>';
      }

      function renderBookmarks(restaurants) {
        allBookmarks = restaurants;
        currentPage = 0;
        renderBookmarkPage();
      }

      function renderBookmarkPage() {
        var list = document.getElementById('bookmarks-list');
        if (!allBookmarks.length) {
          list.innerHTML = '<p style="color:#aaa;font-size:0.9em;padding:20px 0;text-align:center">You have no saved restaurants yet. <a href="/" style="color:#c0392b;font-weight:600">Search for restaurants</a> to bookmark them.</p>';
          document.getElementById('pagination-controls').innerHTML = '';
          return;
        }
        var start = currentPage * PAGE_SIZE;
        var slice = allBookmarks.slice(start, start + PAGE_SIZE);
        list.innerHTML = slice.map(function(r) {
          var grade = r.latestGrade || (r.grades && r.grades.length ? r.grades[0].grade : '—') || '—';
          var rid = r.restaurantId;
          return '<div class="top-restaurant-item" id="bm-' + rid + '">'
            + '<div>'
            + '<div class="restaurant-name">' + (r.name || '—') + '</div>'
            + '<div class="restaurant-borough">' + (r.borough || '—') + '</div>'
            + '</div>'
            + gradeBadgeHtml(grade)
            + '<button class="btn-bookmark bookmarked" data-id="' + rid + '"'
            + ' onclick="removeBookmark(\'' + rid + '\', this)">★</button>'
            + '<a href="/restaurant/' + rid + '" class="btn-view">View →</a>'
            + '</div>';
        }).join('');
        renderPagination();
      }

      function renderPagination() {
        var totalPages = Math.ceil(allBookmarks.length / PAGE_SIZE);
        var el = document.getElementById('pagination-controls');
        if (totalPages <= 1) { el.innerHTML = ''; return; }
        el.innerHTML =
          '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;justify-content:center">'
          + '<button onclick="goPage(-1)" style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:white"'
          + (currentPage === 0 ? ' disabled style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:white;opacity:0.4;cursor:default"' : '') + '>← Prev</button>'
          + '<span style="font-size:0.88em;color:#555">Page ' + (currentPage + 1) + ' of ' + totalPages + '</span>'
          + '<button onclick="goPage(1)" style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:white"'
          + (currentPage >= totalPages - 1 ? ' disabled style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:white;opacity:0.4;cursor:default"' : '') + '>Next →</button>'
          + '</div>';
      }

      function goPage(delta) {
        var maxPage = Math.ceil(allBookmarks.length / PAGE_SIZE) - 1;
        currentPage = Math.max(0, Math.min(maxPage, currentPage + delta));
        renderBookmarkPage();
      }

      function removeBookmark(restaurantId, btn) {
        // Optimistic: fade the row immediately
        var row = document.getElementById('bm-' + restaurantId);
        if (row) row.style.opacity = '0.4';
        fetchWithAuth('/api/users/me/bookmarks/' + restaurantId, { method: 'DELETE' })
          .then(function(r) {
            if (r && r.ok) {
              if (row) row.remove();
              allBookmarks = allBookmarks.filter(function(b) { return b.restaurantId !== restaurantId; });
              var maxPage = Math.max(0, Math.ceil(allBookmarks.length / PAGE_SIZE) - 1);
              currentPage = Math.min(currentPage, maxPage);
              renderBookmarkPage();
            } else {
              if (row) row.style.opacity = '1'; // revert on error
              showToast('Could not remove bookmark', 'error');
            }
          })
          .catch(function() {
            if (row) row.style.opacity = '1';
            showToast('Could not remove bookmark', 'error');
          });
      }

      function loadBookmarks() {
        if (!localStorage.getItem('accessToken')) { window.location.href = '/login'; return; }
        document.getElementById('bookmarks-list').innerHTML = Array(3).fill(
          '<div class="skel" style="height:52px;border-radius:6px;margin-bottom:6px"></div>'
        ).join('');
        fetchWithAuth('/api/users/me/bookmarks')
          .then(function(r) { return r ? r.json() : null; })
          .then(function(data) {
            if (data && data.status === 'success') {
              renderBookmarks(data.data || []);
            } else {
              showToast('Failed to load bookmarks.', 'error');
              document.getElementById('bookmarks-list').innerHTML = '';
            }
          })
          .catch(function() {
            showToast('Failed to load bookmarks.', 'error');
            document.getElementById('bookmarks-list').innerHTML = '';
          });
      }

      document.addEventListener('DOMContentLoaded', loadBookmarks);
    </script>
  </body>
</html>
