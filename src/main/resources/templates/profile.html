<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile — NYC Restaurant Inspector</title>
  <th:block th:replace="fragments/ux-utils :: ux-utils"></th:block>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8f5f0; color: #1a1a1a; margin: 0; }
    .page-header { background: #1a1a1a; color: white; padding: 32px 0; }
    .page-header .eyebrow { font-size: 0.7em; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #c0392b; margin-bottom: 8px; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: 900; margin: 0; }
    .content-card { background: white; border: 1px solid #e8e0d8; padding: 24px; margin-bottom: 16px; }
    .section-label { font-size: 0.68em; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #c0392b; margin-bottom: 6px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.4em; font-weight: 700; margin-bottom: 20px; }
    .mini-card { background: white; border: 1px solid #e8e0d8; border-top: 3px solid #e8e0d8; padding: 16px; transition: border-top-color 0.15s; }
    .mini-card:hover { border-top-color: #c0392b; }
    .error-msg { color: #c0392b; font-size: 0.85em; margin-top: 8px; }
    .civic-footer { background: #1a1a1a; color: rgba(255,255,255,0.45); padding: 24px 0; font-size: 0.78em; }
    .skel { background: #e8e0d8; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>
  <div class="page-header">
    <div class="container">
      <div class="eyebrow">Your Account</div>
      <h1>Your Profile</h1>
    </div>
  </div>
  <div style="padding: 32px 0;">
    <div class="container" style="max-width: 680px;">
      <div id="profile-card" class="content-card" style="text-align: center;">
        <div style="font-size: 3em; color: #e8e0d8; margin-bottom: 16px;">&#128100;</div>
        <div id="p-username" style="font-family: 'Playfair Display', serif; font-size: 1.8em; font-weight: 700; margin-bottom: 4px;">&#8212;</div>
        <div id="p-email" style="font-size: 0.9em; color: #888; margin-bottom: 16px;">&#8212;</div>
        <div id="p-role" style="margin-bottom: 24px;"></div>
        <div id="p-stats" style="display: flex; justify-content: center; gap: 32px;"></div>
      </div>
      <div id="bookmarks-section" class="content-card">
        <div class="section-label">Saved</div>
        <div class="section-title">Your Bookmarks</div>
        <div id="bookmarks-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
          <div style="background: #e8e0d8; border-radius: 2px; height: 80px;"></div>
          <div style="background: #e8e0d8; border-radius: 2px; height: 80px;"></div>
          <div style="background: #e8e0d8; border-radius: 2px; height: 80px;"></div>
        </div>
      </div>
    </div>
  </div>
  <footer class="civic-footer">
    <div class="container d-flex justify-content-between align-items-center">
      <div>NYC Restaurant Inspector · Data from NYC Open Data</div>
    </div>
  </footer>

  <script>
    var token = localStorage.getItem('accessToken');
    if (!token) { window.location.href = '/login'; }

    function fetchWithAuth(url, options) {
      options = options || {};
      return fetch(url, Object.assign({}, options, { headers: Object.assign({}, options.headers || {}, { 'Authorization': 'Bearer ' + token }) }));
    }

    function gradeBadgeHtml(grade) {
      const g = grade || '—';
      let bg = '#ffebee', color = '#b71c1c';
      if (g === 'A') { bg = '#e8f5e9'; color = '#2e7d32'; }
      else if (g === 'B') { bg = '#fff8e1'; color = '#f57f17'; }
      return '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-weight:700;font-size:0.82em;background:' + bg + ';color:' + color + '">' + g + '</span>';
    }

    function renderRestaurantCards(containerId, restaurants, emptyHtml) {
      var grid = document.getElementById(containerId);
      if (!restaurants || restaurants.length === 0) {
        grid.innerHTML = emptyHtml;
        return;
      }
      grid.innerHTML = restaurants.slice(0, 3).map(r =>
        '<div class="mini-card">'
        + '<div style="font-weight:700;font-size:0.9em;margin-bottom:4px">' + (r.name || '—') + '</div>'
        + '<div style="font-size:0.82em;color:#666;margin-bottom:8px">' + (r.borough || '—') + '</div>'
        + gradeBadgeHtml(r.grade)
        + '<br><a href="/restaurant/' + r.restaurantId + '" style="font-size:0.82em;color:#667eea;text-decoration:none;margin-top:8px;display:inline-block">View Details</a>'
        + '</div>').join('');
    }

    fetchWithAuth('/api/users/me')
      .then(r => r.json())
      .then(res => {
        if (res.status !== 'success' || !res.data) {
          document.getElementById('profile-card').innerHTML =
            '<p class="error-msg">Could not load your profile. Please sign in again.</p>'
            + '<a href="/login" style="color:#667eea">Sign In</a>';
          return;
        }
        var d = res.data;
        document.getElementById('p-username').textContent = d.username || '—';
        document.getElementById('p-email').textContent = d.email || '—';

        // Role badge: strip ROLE_ prefix
        var roleLabel = (d.role || '').replace('ROLE_', '');
        var roleBg = roleLabel === 'CUSTOMER' ? '#22c55e' : '#f97316';
        document.getElementById('p-role').innerHTML =
          '<span style="background:' + roleBg + ';color:white;border-radius:20px;padding:4px 12px;font-size:0.78em;font-weight:700">'
          + roleLabel + '</span>';

        // Stats row
        var statsHtml = '';
        statsHtml += '<div style="text-align:center">'
          + '<div style="font-weight:700;font-size:1em;color:#333">' + (d.bookmarkCount != null ? d.bookmarkCount : 0) + '</div>'
          + '<div style="font-size:0.82em;color:#555;margin-top:4px">Bookmarks</div>'
          + '</div>';
        if (d.reportCount != null) {
          statsHtml += '<div style="text-align:center">'
            + '<div style="font-weight:700;font-size:1em;color:#333">' + d.reportCount + '</div>'
            + '<div style="font-size:0.82em;color:#555;margin-top:4px">Reports</div>'
            + '</div>';
        }
        document.getElementById('p-stats').innerHTML = statsHtml;
      })
      .catch(() => {
        document.getElementById('profile-card').innerHTML =
          '<p class="error-msg">Could not load your profile. Please sign in again.</p>'
          + '<a href="/login" style="color:#667eea">Sign In</a>';
      });

    fetchWithAuth('/api/users/me/bookmarks')
      .then(r => r.json())
      .then(res => {
        renderRestaurantCards('bookmarks-grid', res.data,
          '<p style="color:#666;font-size:0.88em">You haven\'t bookmarked any restaurants yet.</p>');
      })
      .catch(() => {
        document.getElementById('bookmarks-grid').innerHTML =
          '<p style="color:#b71c1c;font-size:0.85em">Could not load bookmarks.</p>';
      });
  </script>
</body>
</html>
