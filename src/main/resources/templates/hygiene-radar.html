<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hygiene Radar - NYC Restaurant Inspections</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #fff;
        min-height: 100vh;
      }

      .container { display: flex; height: 100vh; }

      /* ---- SIDEBAR ---- */
      .sidebar {
        width: 360px;
        background: rgba(0, 0, 0, 0.8);
        padding: 20px;
        overflow-y: auto;
        box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
        border-right: 3px solid #ff1744;
        flex-shrink: 0;
      }

      .sidebar::-webkit-scrollbar { width: 8px; }
      .sidebar::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
      .sidebar::-webkit-scrollbar-thumb { background: #ff1744; border-radius: 4px; }

      .header {
        text-align: center;
        margin-bottom: 20px;
        border-bottom: 2px solid #ff1744;
        padding-bottom: 15px;
      }

      .header h1 {
        font-size: 1.8em;
        margin-bottom: 5px;
        text-shadow: 0 2px 10px rgba(255,23,68,0.5);
        color: #ff1744;
      }

      .header p { font-size: 0.85em; opacity: 0.8; font-style: italic; }

      .back-link {
        display: inline-block;
        margin-bottom: 12px;
        color: #aaa;
        font-size: 0.85em;
        text-decoration: none;
      }
      .back-link:hover { color: #fff; }

      /* ---- CONTROLS ---- */
      .controls { margin-bottom: 20px; }

      .control-group { margin-bottom: 12px; }

      .control-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #ff1744;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .control-group select,
      .control-group input[type="number"] {
        width: 100%;
        padding: 9px 10px;
        background: rgba(255,255,255,0.1);
        border: 2px solid #ff1744;
        border-radius: 5px;
        color: #fff;
        font-size: 0.9em;
        transition: all 0.2s ease;
      }

      .control-group select:focus,
      .control-group input[type="number"]:focus {
        outline: none;
        background: rgba(255,255,255,0.18);
        box-shadow: 0 0 8px rgba(255,23,68,0.3);
      }

      .control-group select option { background: #1a1a2e; color: #fff; }

      .control-group input[type="number"]::placeholder { color: #aaa; }

      /* Range slider */
      .range-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .control-group input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #ff1744 0%, #ff1744 var(--pct, 100%), rgba(255,255,255,0.2) var(--pct, 100%));
        border: none;
        outline: none;
        cursor: pointer;
        padding: 0;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ff1744;
        border: 3px solid #fff;
        box-shadow: 0 0 6px rgba(255,23,68,0.6);
        cursor: pointer;
      }

      .control-group input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ff1744;
        border: 3px solid #fff;
        box-shadow: 0 0 6px rgba(255,23,68,0.6);
        cursor: pointer;
      }

      .range-value {
        min-width: 38px;
        text-align: right;
        font-size: 0.9em;
        font-weight: 700;
        color: #ff1744;
      }

      .range-bounds {
        display: flex;
        justify-content: space-between;
        font-size: 0.75em;
        color: #666;
        margin-top: 3px;
        padding: 0 2px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        background: rgba(255,255,255,0.05);
        border: 2px solid rgba(255,23,68,0.4);
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      .checkbox-group:hover { background: rgba(255,255,255,0.1); }

      .checkbox-group input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #ff1744;
        cursor: pointer;
        flex-shrink: 0;
      }

      .checkbox-group span {
        font-size: 0.9em;
        color: #ddd;
        user-select: none;
      }

      .filters-section {
        border-top: 1px solid rgba(255,23,68,0.3);
        padding-top: 12px;
        margin-top: 4px;
      }

      .filters-title {
        font-size: 0.75em;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }

      .btn-search {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #ff1744 0%, #c41c3b 100%);
        border: none;
        border-radius: 5px;
        color: white;
        font-weight: 700;
        font-size: 0.95em;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
      }

      .btn-search:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(255,23,68,0.5);
      }
      .btn-search:active { transform: translateY(0); }

      /* ---- ERROR / LOADING ---- */
      .error {
        background: rgba(244,67,54,0.15);
        border: 1px solid #f44336;
        border-radius: 5px;
        padding: 10px 12px;
        margin-bottom: 12px;
        display: none;
        color: #ffcdd2;
        font-size: 0.9em;
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: #ff1744;
        display: none;
      }

      .loading i { font-size: 2em; animation: spin 1s linear infinite; }

      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* ---- RESULTS ---- */
      .restaurants-list { margin-top: 16px; }

      .no-results {
        text-align: center;
        color: #888;
        padding: 20px;
        font-style: italic;
        font-size: 0.9em;
      }

      .restaurant-item {
        background: rgba(255,23,68,0.07);
        border-left: 4px solid #ff1744;
        padding: 12px 14px;
        margin-bottom: 10px;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.25s ease;
        border: 1px solid rgba(255,23,68,0.25);
      }

      .restaurant-item:hover {
        background: rgba(255,23,68,0.18);
        transform: translateX(4px);
        box-shadow: 0 3px 10px rgba(255,23,68,0.2);
      }

      .restaurant-item.active {
        background: rgba(255,23,68,0.28);
        box-shadow: 0 0 14px rgba(255,23,68,0.35);
      }

      .restaurant-name {
        font-weight: 700;
        font-size: 0.95em;
        margin-bottom: 4px;
        color: #ff5252;
      }

      .restaurant-meta {
        font-size: 0.82em;
        color: #bbb;
        margin-bottom: 2px;
      }

      .restaurant-address {
        font-size: 0.78em;
        color: #888;
        margin-top: 4px;
        font-style: italic;
      }

      .cuisine-badge {
        display: inline-block;
        background: rgba(255,23,68,0.2);
        border: 1px solid rgba(255,23,68,0.5);
        border-radius: 3px;
        padding: 1px 6px;
        font-size: 0.78em;
        color: #ff8a80;
        margin-top: 4px;
      }

      /* ---- STATS ---- */
      .stats {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,23,68,0.3);
        border-radius: 5px;
        padding: 10px 14px;
        margin-top: 16px;
        font-size: 0.88em;
        display: flex;
        justify-content: space-around;
        text-align: center;
      }

      .stat-item { display: flex; flex-direction: column; gap: 2px; }
      .stat-value { color: #ff1744; font-weight: 700; font-size: 1.3em; }
      .stat-label { color: #888; font-size: 0.85em; }

      /* ---- MAP ---- */
      .map-container { flex: 1; position: relative; }
      #map { width: 100%; height: 100%; }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 1024px) {
        .sidebar { width: 300px; }
        .header h1 { font-size: 1.5em; }
      }

      @media (max-width: 768px) {
        .container { flex-direction: column; }
        .sidebar {
          width: 100%;
          height: 50%;
          border-right: none;
          border-bottom: 3px solid #ff1744;
        }
        .map-container { height: 50%; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>

        <div class="header">
          <h1><i class="fas fa-shield-virus"></i> Hygiene Radar</h1>
          <p>Inspection of at-risk establishments in NYC</p>
        </div>

        <div class="error" id="error-message"></div>

        <div class="controls">
          <!-- Borough -->
          <div class="control-group">
            <label for="borough-select">Borough</label>
            <select id="borough-select">
              <option value="">All boroughs</option>
              <option value="Manhattan">Manhattan</option>
              <option value="Brooklyn">Brooklyn</option>
              <option value="Queens">Queens</option>
              <option value="Bronx">Bronx</option>
              <option value="Staten Island">Staten Island</option>
            </select>
          </div>

          <!-- Cuisine type -->
          <div class="control-group">
            <label for="cuisine-filter">Cuisine type</label>
            <select id="cuisine-filter">
              <option value="">All cuisines</option>
            </select>
          </div>

          <!-- Number of restaurants -->
          <div class="control-group">
            <label for="restaurant-limit">Number of restaurants</label>
            <input type="number" id="restaurant-limit" value="25" min="1" max="200" />
          </div>

          <!-- Max score -->
          <div class="control-group">
            <label for="score-max">Max score: <span id="score-max-display">No limit</span></label>
            <div class="range-wrapper">
              <input type="range" id="score-max" min="0" max="100" step="1" value="100"
                oninput="updateScoreDisplay(this.value)" />
              <span class="range-value" id="score-max-val">—</span>
            </div>
            <div class="range-bounds"><span>0</span><span>100</span></div>
          </div>

          <!-- GPS only -->
          <label class="checkbox-group" for="gps-only">
            <input type="checkbox" id="gps-only" />
            <span><i class="fas fa-map-marker-alt"></i> GPS only</span>
          </label>
        </div>

        <div class="loading" id="loading">
          <i class="fas fa-spinner"></i>
          <p>Searching...</p>
        </div>

        <div class="restaurants-list" id="restaurants-list"></div>
        <div class="stats" id="stats" style="display:none"></div>
      </div>

      <!-- Map -->
      <div class="map-container">
        <div id="map"></div>
      </div>
    </div>

    <script>
      const map = L.map("map").setView([40.7128, -74.006], 12);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 18,
      }).addTo(map);

      let markersLayer = L.featureGroup().addTo(map);
      let allRestaurants = [];
      let currentRestaurants = [];

      function searchHygieneRadar() {
        const borough = document.getElementById("borough-select").value;
        const cuisine = document.getElementById("cuisine-filter").value;
        const restaurantLimit = parseInt(document.getElementById("restaurant-limit").value) || 25;
        const scoreVal = parseInt(document.getElementById("score-max").value);
        const hasScoreLimit = scoreVal < 100;

        let url = `/api/restaurants/hygiene-radar?limit=100&restaurantLimit=${restaurantLimit}`;
        if (borough !== "") url += `&borough=${encodeURIComponent(borough)}`;
        if (cuisine !== "") url += `&cuisine=${encodeURIComponent(cuisine)}`;
        if (hasScoreLimit) url += `&maxScore=${scoreVal}`;

        hideError();
        showLoading();
        clearMap();
        document.getElementById("stats").style.display = "none";

        fetch(url)
          .then((r) => {
            if (!r.ok) throw new Error("Server error");
            return r.json();
          })
          .then((data) => {
            if (data.status === "success") {
              allRestaurants = data.data;
              applyGpsFilter();
            } else {
              showError(data.message || "Search error");
            }
          })
          .catch((err) => {
            console.error(err);
            showError("Unable to connect to the server");
          })
          .finally(hideLoading);
      }

      function loadAllCuisines() {
        fetch("/api/restaurants/cuisines")
          .then((r) => r.json())
          .then((data) => {
            if (data.status !== "success") return;
            const select = document.getElementById("cuisine-filter");
            const current = select.value;
            select.innerHTML = '<option value="">All cuisines</option>';
            data.data.forEach((c) => {
              const opt = document.createElement("option");
              opt.value = c;
              opt.textContent = c;
              if (c === current) opt.selected = true;
              select.appendChild(opt);
            });
          })
          .catch(() => {});
      }

      function applyGpsFilter() {
        const gpsOnly = document.getElementById("gps-only").checked;
        const filtered = gpsOnly
          ? allRestaurants.filter((r) => r.latitude && r.longitude)
          : allRestaurants;

        currentRestaurants = filtered;
        displayRestaurants(filtered);
        addMarkersToMap(filtered);
        updateStats(filtered.length, allRestaurants.length);
        if (filtered.length > 0) fitMapToMarkers();
      }

      function displayRestaurants(restaurants) {
        const container = document.getElementById("restaurants-list");
        if (restaurants.length === 0) {
          container.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><br>No restaurants found</div>';
          return;
        }
        container.innerHTML = "";
        restaurants.forEach((restaurant, index) => {
          const div = document.createElement("div");
          div.className = "restaurant-item";
          const addr = restaurant.address
            ? `${restaurant.address.building || ""} ${restaurant.address.street || ""}, ${restaurant.address.zipcode || ""}`.trim().replace(/^,\s*/, "")
            : "";
          const hasGps = restaurant.latitude && restaurant.longitude;
          div.innerHTML = `
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div style="flex:1;min-width:0">
                <div class="restaurant-name">
                  ${hasGps ? '<i class="fas fa-map-pin" style="font-size:0.85em;margin-right:4px;"></i>' : ''}${restaurant.name}
                </div>
                <div class="restaurant-meta">${restaurant.borough}</div>
                <span class="cuisine-badge">${restaurant.cuisine}</span>
                ${addr ? `<div class="restaurant-address">${addr}</div>` : ""}
              </div>
              <a href="/restaurant/${restaurant.restaurantId}"
                 style="flex-shrink:0;font-size:0.78em;padding:3px 8px;background:rgba(255,23,68,0.15);color:#ff8a80;border:1px solid rgba(255,23,68,0.4);border-radius:4px;text-decoration:none;font-weight:600;white-space:nowrap"
                 title="View details">Details</a>
            </div>
          `;
          div.addEventListener("click", () => {
            highlightRestaurant(index);
            focusMarker(index);
          });
          container.appendChild(div);
        });
      }

      function addMarkersToMap(restaurants) {
        markersLayer.clearLayers();
        restaurants.forEach((restaurant, index) => {
          if (restaurant.latitude && restaurant.longitude) {
            const marker = L.marker([restaurant.latitude, restaurant.longitude], {
              icon: L.divIcon({
                className: "",
                html: '<div style="width:28px;height:28px;background:#ff1744;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.6)"></div>',
                iconSize: [28, 28],
                iconAnchor: [14, 28],
                popupAnchor: [0, -30],
              }),
            });

            const addr = restaurant.address
              ? `${restaurant.address.building || ""} ${restaurant.address.street || ""}, ${restaurant.address.zipcode || ""}`.trim().replace(/^,\s*/, "")
              : "";
            marker.bindPopup(`
              <div style="max-width:200px">
                <h4 style="margin:0 0 8px 0;color:#ff1744">${restaurant.name}</h4>
                <p style="margin:4px 0"><strong>Cuisine:</strong> ${restaurant.cuisine}</p>
                <p style="margin:4px 0"><strong>Borough:</strong> ${restaurant.borough}</p>
                ${addr ? `<p style="margin:4px 0;font-size:0.9em;color:#666">${addr}</p>` : ""}
              </div>
            `);
            marker.on("click", () => highlightRestaurant(index));
            markersLayer.addLayer(marker);
          }
        });
      }

      function highlightRestaurant(index) {
        document.querySelectorAll(".restaurant-item").forEach((el) => el.classList.remove("active"));
        const items = document.querySelectorAll(".restaurant-item");
        if (items[index]) {
          items[index].classList.add("active");
          items[index].scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      function focusMarker(index) {
        const restaurant = currentRestaurants[index];
        if (restaurant && restaurant.latitude && restaurant.longitude) {
          map.setView([restaurant.latitude, restaurant.longitude], 16);
        }
      }

      function fitMapToMarkers() {
        const bounds = markersLayer.getBounds();
        if (bounds.isValid()) map.fitBounds(bounds, { padding: [80, 80] });
      }

      function clearMap() {
        markersLayer.clearLayers();
      }

      function updateStats(filtered, total) {
        const statsDiv = document.getElementById("stats");
        const gpsCount = currentRestaurants.filter((r) => r.latitude && r.longitude).length;
        statsDiv.style.display = "flex";
        statsDiv.innerHTML = `
          <div class="stat-item">
            <span class="stat-value">${filtered}</span>
            <span class="stat-label">displayed</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">${total}</span>
            <span class="stat-label">total</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">${gpsCount}</span>
            <span class="stat-label">on map</span>
          </div>
        `;
      }

      function showError(message) {
        const errorDiv = document.getElementById("error-message");
        errorDiv.textContent = message;
        errorDiv.style.display = "block";
      }

      function hideError() {
        document.getElementById("error-message").style.display = "none";
      }

      function showLoading() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("restaurants-list").innerHTML = "";
      }

      function hideLoading() {
        document.getElementById("loading").style.display = "none";
      }

      function updateScoreDisplay(val) {
        const v = parseInt(val);
        const labelEl = document.getElementById("score-max-display");
        const valEl = document.getElementById("score-max-val");
        const slider = document.getElementById("score-max");
        slider.style.setProperty("--pct", v + "%");
        if (v >= 100) {
          labelEl.textContent = "No limit";
          labelEl.style.color = "#888";
          valEl.textContent = "—";
        } else {
          labelEl.textContent = v;
          labelEl.style.color = "#ff1744";
          valEl.textContent = v;
        }
      }

      // Debounce for continuous-input fields
      function debounce(fn, delay) {
        let timer;
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
      }

      const debouncedSearch = debounce(searchHygieneRadar, 400);

      window.addEventListener("load", () => {
        updateScoreDisplay(100);
        loadAllCuisines();
        searchHygieneRadar();

        // Backend filters → new search
        document.getElementById("borough-select").addEventListener("change", searchHygieneRadar);
        document.getElementById("cuisine-filter").addEventListener("change", searchHygieneRadar);
        document.getElementById("restaurant-limit").addEventListener("input", debouncedSearch);
        document.getElementById("score-max").addEventListener("change", searchHygieneRadar);

        // GPS only → client-side filter only
        document.getElementById("gps-only").addEventListener("change", applyGpsFilter);
      });
    </script>
  </body>
</html>
