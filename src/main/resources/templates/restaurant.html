<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Details</title>
    <th:block th:replace="fragments/ux-utils :: ux-utils"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      body { font-family: 'Inter', sans-serif; background: #f8f5f0; color: #1a1a1a; }
      .page-header { background: #1a1a1a; color: white; padding: 32px 0; }
      .page-header .eyebrow { font-size: 0.7em; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
      .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2em; font-weight: 900; margin: 0; word-break: break-word; }
      .back-link { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.82em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
      .back-link:hover { color: white; }
      .content-card { background: white; border: 1px solid #e8e0d8; padding: 24px; margin-bottom: 16px; }
      .section-label { font-size: 0.68em; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #c0392b; margin-bottom: 6px; }
      .section-title { font-family: 'Playfair Display', serif; font-size: 1.3em; font-weight: 700; margin-bottom: 16px; }
      .grade-badge-lg { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; font-family: 'Playfair Display', serif; font-weight: 900; font-size: 2em; border-radius: 2px; float: right; margin-left: 16px; }
      .grade-a-lg { background: #e8f5e9; color: #2e7d32; }
      .grade-b-lg { background: #fff8e1; color: #f57f17; }
      .grade-c-lg { background: #ffebee; color: #c62828; }
      .trend-badge { display: inline-block; padding: 4px 10px; font-size: 0.78em; font-weight: 600; border-radius: 2px; }
      .trend-improving { background: #e8f5e9; color: #2e7d32; }
      .trend-worsening { background: #ffebee; color: #b71c1c; }
      .trend-stable    { background: #f5f5f5; color: #757575; }
      .insp-table { width: 100%; font-size: 0.84em; border-collapse: collapse; }
      .insp-table th { font-size: 0.72em; letter-spacing: 0.08em; text-transform: uppercase; color: #888; font-weight: 600; border-bottom: 2px solid #e8e0d8; padding: 8px 12px; text-align: left; }
      .insp-table td { padding: 8px 12px; border-bottom: 1px solid #f0ebe3; vertical-align: middle; }
      .insp-table tr:hover td { background: #faf7f4; }
      .btn-bookmark-civic { font-size: 0.82em; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border: 1px solid #c0392b; color: #c0392b; background: white; padding: 7px 18px; border-radius: 0; cursor: pointer; transition: background 0.15s, color 0.15s; }
      .btn-bookmark-civic:hover, .btn-bookmark-civic.bookmarked { background: #c0392b; color: white; }
      .civic-footer { background: #1a1a1a; color: rgba(255,255,255,0.45); padding: 24px 0; font-size: 0.78em; }

      /* Preserved — used by JS-injected content */
      .header-info { flex: 1; min-width: 200px; }
      .restaurant-name { font-size: 1.5em; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
      .restaurant-meta { font-size: 0.92em; color: #666; margin-bottom: 4px; }
      .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 4px; font-weight: 700; font-size: 1em; margin-top: 10px; }
      .badge-green  { background: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; }
      .badge-yellow { background: #fff8e1; color: #f57f17; border: 2px solid #ffc107; }
      .badge-orange { background: #fff3e0; color: #e65100; border: 2px solid #ff9800; }
      .badge-red    { background: #ffebee; color: #b71c1c; border: 2px solid #f44336; }
      .grade-a { color: #2e7d32; font-weight: 700; }
      .grade-b { color: #f57f17; font-weight: 700; }
      .grade-c { color: #e65100; font-weight: 700; }
      .grade-bad { color: #b71c1c; font-weight: 700; }
      .critical-yes { color: #c62828; font-weight: 600; font-size: 0.85em; }
      .critical-no  { color: #aaa; font-size: 0.85em; }
      .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #c0392b; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
      .error { background: #fee; color: #c33; padding: 12px; border-left: 4px solid #c33; }
      .no-location { background: #f5f5f5; height: 240px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.9em; }
      .nearby-card { background: white; border: 1px solid #e8e0d8; padding: 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #map { width: 100%; height: 240px; }
      .chart-wrapper { height: 200px; position: relative; }
      table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
      th { background: #1a1a1a; color: white; padding: 10px 12px; text-align: left; font-weight: 600; }
      td { padding: 9px 12px; border-bottom: 1px solid #f0ebe3; }
      tr:hover td { background: #faf7f4; }
    </style>
  </head>
  <body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="page-header">
      <div class="container">
        <div class="eyebrow"><a href="/" class="back-link">&#8592; Back to Search</a></div>
        <h1 id="page-title" style="min-height:1.2em">Loading&#8230;</h1>
      </div>
    </div>

    <div style="padding: 32px 0;">
      <div class="container">
        <div class="row g-3">

          <!-- LEFT COLUMN: Details + Map + Contact + Nearby -->
          <div class="col-md-5">
            <div class="content-card">
              <div class="section-label">Details</div>
              <div id="header-card" style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">
                <div class="spinner"></div>
              </div>
            </div>
            <div class="content-card">
              <div class="section-label">Location</div>
              <div id="map-container"><div class="spinner"></div></div>
            </div>
            <div class="content-card" id="contact-section">
              <div class="section-label">Contact &amp; Address</div>
              <div class="section-title">Restaurant Info</div>
              <div id="contact-address"></div>
              <div id="contact-phone"></div>
              <div id="contact-website"></div>
              <div id="contact-hours"></div>
            </div>
            <div id="nearby-section" style="display:none">
              <div class="content-card">
                <div class="section-label">Nearby</div>
                <div class="section-title">Nearby Restaurants</div>
                <p id="nearby-loading" style="color:#666;font-size:0.88em">Loading nearby restaurants&hellip;</p>
                <div id="nearby-grid" style="display:none;grid-template-columns:repeat(2,1fr);gap:12px"></div>
                <p id="nearby-empty" style="display:none;color:#666;font-size:0.88em">No restaurants found within 500m.</p>
              </div>
            </div>
          </div>

          <!-- RIGHT COLUMN: Chart + Inspections -->
          <div class="col-md-7">
            <div class="content-card">
              <div class="section-label">Score History</div>
              <div class="section-title">Inspection Trend</div>
              <div class="chart-wrapper">
                <canvas id="score-chart"></canvas>
              </div>
            </div>
            <div class="content-card">
              <div class="section-label">Inspection Records</div>
              <div class="section-title">History</div>
              <div id="inspections-table"><div class="spinner"></div></div>
            </div>
          </div>

        </div>

      </div>
    </div>

    <footer class="civic-footer">
      <div class="container d-flex justify-content-between align-items-center">
        <div>NYC Restaurant Inspector &middot; Data from NYC Open Data</div>
      </div>
    </footer>

    <script>
      const restaurantId = window.location.pathname.split("/").filter(Boolean).pop();
      let currentRestaurantId = null;

      function getAuthHeaders() {
        const token = localStorage.getItem("accessToken");
        if (!token) return { "Content-Type": "application/json" };
        return {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        };
      }

      function handleFetchErrorResponse(response) {
        if (response.status === 401 || response.status === 403) {
          localStorage.removeItem("accessToken");
          localStorage.removeItem("refreshToken");
          window.location.href = "/login";
          throw new Error("Unauthorized");
        }
        return response;
      }

      function fetchWithAuth(url, options = {}) {
        options.headers = { ...getAuthHeaders(), ...(options.headers || {}) };
        return fetch(url, options).then(handleFetchErrorResponse);
      }

      function updateBookmarkBtn(saved) {
        const btn = document.getElementById('bookmark-btn');
        if (!btn) return;
        if (saved) {
          btn.textContent = '✓ Saved';
          btn.style.background = '#f5a623';
          btn.style.color = 'white';
          btn.style.borderColor = '#f5a623';
        } else {
          btn.textContent = '+ Bookmark';
          btn.style.background = '#f0f2ff';
          btn.style.color = '#667eea';
          btn.style.borderColor = '#c5caf7';
        }
      }

      function handleBookmarkClick() {
        if (!localStorage.getItem('accessToken')) {
          window.location.href = '/login';
          return;
        }
        const btn = document.getElementById('bookmark-btn');
        const saved = btn.textContent.includes('Saved');
        // Optimistic toggle
        updateBookmarkBtn(!saved);
        const method = saved ? 'DELETE' : 'POST';
        fetchWithAuth('/api/users/me/bookmarks/' + currentRestaurantId, { method })
          .then(r => {
            if (!r || !r.ok) {
              updateBookmarkBtn(saved); // revert on error
              showToast('Could not update bookmark', 'error');
            } else {
              showToast(saved ? 'Bookmark removed' : 'Bookmarked!', 'success');
            }
          })
          .catch(() => {
            updateBookmarkBtn(saved);
            showToast('Could not update bookmark', 'error');
          });
      }

      function gradeClass(g) {
        if (g === "A") return "grade-a";
        if (g === "B") return "grade-b";
        if (g === "C") return "grade-c";
        return "grade-bad";
      }

      function gradeBadgeHtml(grade) {
        if (grade === 'A') return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.82em;font-weight:700;background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50">A</span>';
        if (grade === 'B') return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.82em;font-weight:700;background:#fff8e1;color:#f57f17;border:1px solid #ffc107">B</span>';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.82em;font-weight:700;background:#ffebee;color:#b71c1c;border:1px solid #f44336">' + (grade || '&mdash;') + '</span>';
      }

      function loadNearby(lat, lng, currentId) {
        if (!lat || !lng) return;
        document.getElementById('nearby-section').style.display = 'block';
        fetch('/api/restaurants/nearby?lat=' + lat + '&lng=' + lng + '&radius=500&limit=6')
          .then(function(res) { return res.json(); })
          .then(function(data) {
            document.getElementById('nearby-loading').style.display = 'none';
            var others = (data.data || []).filter(function(r) {
              return r.restaurantId !== currentId;
            }).slice(0, 4);
            if (others.length === 0) {
              document.getElementById('nearby-empty').style.display = 'block';
              return;
            }
            var grid = document.getElementById('nearby-grid');
            grid.style.display = 'grid';
            grid.innerHTML = others.map(function(r) {
              return '<div class="nearby-card">'
                + '<div style="font-weight:700;font-size:0.88em;margin-bottom:4px">' + (r.name || '&mdash;') + '</div>'
                + '<div style="font-size:0.82em;color:#666;margin-bottom:8px">' + (r.borough || '&mdash;') + '</div>'
                + gradeBadgeHtml(r.grade)
                + '<br><a href="/restaurant/' + r.restaurantId + '" style="font-size:0.82em;color:#667eea;text-decoration:none;margin-top:8px;display:inline-block">View Details</a>'
                + '</div>';
            }).join('');
          })
          .catch(function() {
            document.getElementById('nearby-section').style.display = 'none';
          });
      }

      function formatDate(d) {
        if (!d) return "—";
        return d.substring(0, 10);
      }

      function renderHeader(r) {
        const addr = r.address
          ? [r.address.building, r.address.street, r.address.zipcode].filter(Boolean).join(" ")
          : "";
        const badgeColor = r.badgeColor || "red";
        const trend = r.trend || "stable";
        const latestGrade = r.latestGrade || "N/A";
        const latestScore = r.latestScore != null ? r.latestScore : "—";

        const trendLabel = { improving: "↑ Improving", stable: "→ Stable", worsening: "↓ Worsening" };
        const trendClass = { improving: "trend-improving", stable: "trend-stable", worsening: "trend-worsening" };

        document.getElementById("header-card").innerHTML = `
          <div class="header-info">
            <div class="restaurant-name">${r.name || "—"}</div>
            <div class="restaurant-meta">${r.borough || ""} · ${r.cuisine || ""}</div>
            <div class="badge badge-${badgeColor}">
              Grade ${latestGrade}
              <span style="font-weight:400;font-size:0.85em">Score ${latestScore}</span>
            </div>
            <span class="trend-badge ${trendClass[trend]}">${trendLabel[trend] || trend}</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0;margin-left:auto">
            <div id="grade-circle" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8em;font-weight:700;background:#f0f0f0;color:#666">—</div>
            <div id="latest-score" style="font-size:0.85em;color:#666;text-align:center">Score: —</div>
            <button id="bookmark-btn" onclick="handleBookmarkClick()"
                    style="background:#f0f2ff;color:#667eea;border:1px solid #c5caf7;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:0.88em;font-weight:600;white-space:nowrap">+ Bookmark</button>
          </div>
        `;
        document.title = `${r.name} — Restaurant Details`;
        const pageTitleEl = document.getElementById('page-title');
        if (pageTitleEl) pageTitleEl.textContent = r.name || '—';

        // Grade circle
        const gradeCircle = document.getElementById('grade-circle');
        const scoreEl = document.getElementById('latest-score');
        const grade = r.latestGrade || '—';
        if (grade === 'A') {
          gradeCircle.style.background = '#e8f5e9';
          gradeCircle.style.color = '#2e7d32';
          gradeCircle.style.border = '2px solid #4caf50';
        } else if (grade === 'B') {
          gradeCircle.style.background = '#fff8e1';
          gradeCircle.style.color = '#f57f17';
          gradeCircle.style.border = '2px solid #ffc107';
        } else {
          gradeCircle.style.background = '#ffebee';
          gradeCircle.style.color = '#b71c1c';
          gradeCircle.style.border = '2px solid #f44336';
        }
        gradeCircle.textContent = grade;
        if (r.latestScore != null) {
          scoreEl.textContent = 'Score: ' + r.latestScore;
        }
      }

      function renderMap(r) {
        const container = document.getElementById("map-container");
        if (!r.latitude || !r.longitude) {
          container.innerHTML = '<div class="no-location">GPS coordinates not available</div>';
          return;
        }
        container.innerHTML = '<div id="map"></div>';
        const map = L.map("map").setView([r.latitude, r.longitude], 16);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors", maxZoom: 18
        }).addTo(map);
        const addr = r.address
          ? [r.address.building, r.address.street, r.address.zipcode].filter(Boolean).join(" ")
          : "";
        L.marker([r.latitude, r.longitude])
          .addTo(map)
          .bindPopup(`<strong>${r.name}</strong>${addr ? "<br>" + addr : ""}`)
          .openPopup();
      }

      function renderScoreChart(grades) {
        var sorted = (grades || [])
          .filter(function(g) { return g.date && g.score != null; })
          .sort(function(a, b) { return a.date.localeCompare(b.date); });

        if (sorted.length === 0) {
          var container = document.getElementById('score-chart').parentElement;
          container.textContent = 'No score data available';
          container.style.cssText = 'color:#aaa;font-size:0.9em;padding:20px 0';
          return;
        }

        var GRADE_COLORS = { A: '#2e7d32', B: '#f9a825', C: '#e65100', F: '#b71c1c',
                             Z: '#9e9e9e', P: '#9e9e9e', N: '#9e9e9e' };
        function gradeColor(g) { return GRADE_COLORS[g] || '#9e9e9e'; }

        var existing = Chart.getChart('score-chart');
        if (existing) existing.destroy();

        var chart = new Chart(document.getElementById('score-chart'), {
          type: 'line',
          data: {
            labels: sorted.map(function(g) { return g.date.substring(0, 10); }),
            datasets: [{
              label: 'Score',
              data: sorted.map(function(g) { return g.score; }),
              borderColor: '#888',
              backgroundColor: 'rgba(136,136,136,0.08)',
              tension: 0.3,
              fill: true,
              pointRadius: 6,
              pointHoverRadius: 8,
              pointBackgroundColor: sorted.map(function(g) { return gradeColor(g.grade); }),
              pointBorderColor: sorted.map(function(g) { return gradeColor(g.grade); })
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(ctx) {
                    var g = sorted[ctx.dataIndex];
                    return 'Score: ' + g.score + '  |  Grade: ' + (g.grade || '—');
                  }
                }
              }
            },
            scales: {
              y: {
                reverse: true,
                min: 0,
                title: { display: true, text: 'Score (lower = better)', font: { size: 11 } },
                grid: { color: '#f0f0f0' }
              },
              x: {
                grid: { display: false },
                ticks: { maxTicksLimit: 8, font: { size: 10 } }
              }
            }
          }
        });
        setTimeout(function() { if (chart && chart.canvas) { chart.resize(); } }, 50);
      }

      function renderInspections(grades) {
        const container = document.getElementById("inspections-table");
        if (!grades || grades.length === 0) {
          container.innerHTML = '<p style="color:#aaa;padding:10px">No inspections recorded</p>';
          return;
        }
        const sorted = [...grades].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
        let html = `<div style="overflow-x:auto"><table>
          <thead><tr>
            <th>Date</th><th>Grade</th><th>Score</th><th>Inspection type</th>
            <th>Critical</th><th>Violation code</th><th>Description</th>
          </tr></thead><tbody>`;
        sorted.forEach(g => {
          const gc = gradeClass(g.grade);
          const crit = g.criticalFlag === "Critical" || g.criticalFlag === "Y";
          html += `<tr>
            <td>${formatDate(g.date)}</td>
            <td><span class="${gc}">${g.grade || "—"}</span></td>
            <td>${g.score != null ? g.score : "—"}</td>
            <td style="font-size:0.85em;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.inspectionType || "—"}</td>
            <td><span class="${crit ? "critical-yes" : "critical-no"}">${crit ? "⚠ Yes" : "No"}</span></td>
            <td style="font-family:monospace;font-size:0.85em">${g.violationCode || "—"}</td>
            <td style="font-size:0.82em;max-width:220px">
              ${g.violationDescription
                ? `<span class="desc-clamp" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer" onclick="this.style.webkitLineClamp=this.style.webkitLineClamp?'':'2';this.style.overflow=this.style.overflow?'':'hidden'">${g.violationDescription}</span>`
                : "—"}
            </td>
          </tr>`;
        });
        html += "</tbody></table></div>";
        container.innerHTML = html;
      }

      fetch(`/api/restaurants/${restaurantId}`)
        .then(r => {
          if (r.status === 404) throw new Error("Not found");
          return r.json();
        })
        .then(resp => {
          if (resp.status !== "success") {
            showToast('Could not load restaurant details', 'error');
            document.getElementById("header-card").innerHTML = '<p style="color:#888;padding:24px;text-align:center">Restaurant data unavailable</p>';
            return;
          }
          const r = resp.data;
          currentRestaurantId = r.restaurantId;
          renderHeader(r);
          renderMap(r);
          renderScoreChart(r.grades);
          renderInspections(r.grades);
          (function renderContact(r) {
              function makeLabel(text) {
                  var el = document.createElement('div');
                  el.style.cssText = 'font-size:0.75em;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#888;margin-bottom:2px;margin-top:12px';
                  el.textContent = text;
                  return el;
              }
              function makeRow(label, content) {
                  var wrap = document.createElement('div');
                  wrap.appendChild(makeLabel(label));
                  wrap.appendChild(content);
                  return wrap;
              }

              // Address — always shown when available
              var addr = r.address;
              if (addr) {
                  var parts = [addr.building, addr.street].filter(Boolean).join(' ');
                  var full = [parts, r.borough, addr.zipcode].filter(Boolean).join(', ');
                  if (full) {
                      var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(full + ', New York City');
                      var addrEl = document.createElement('a');
                      addrEl.href = mapsUrl;
                      addrEl.target = '_blank';
                      addrEl.rel = 'noopener noreferrer';
                      addrEl.textContent = full;
                      addrEl.style.cssText = 'color:#c0392b;text-decoration:none;font-weight:600;font-size:0.9em';
                      document.getElementById('contact-address').appendChild(makeRow('Address', addrEl));
                  }
              }

              // Phone — prefer OSM phone (formatted), fall back to NYC data phone
              var rawPhone = r.osmPhone || r.phone;
              if (rawPhone) {
                  var digits = rawPhone.replace(/[^0-9]/g, '');
                  var formatted = digits.length === 10
                      ? '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6)
                      : rawPhone;
                  var phoneEl = document.createElement('a');
                  phoneEl.href = 'tel:+1' + digits;
                  phoneEl.textContent = formatted;
                  phoneEl.style.cssText = 'color:#c0392b;text-decoration:none;font-weight:600;font-size:0.9em';
                  document.getElementById('contact-phone').appendChild(makeRow('Phone', phoneEl));
              }

              // Website — OSM only
              if (r.osmWebsite) {
                  try {
                      var parsed = new URL(r.osmWebsite);
                      if (parsed.protocol === 'https:' || parsed.protocol === 'http:') {
                          var siteEl = document.createElement('a');
                          siteEl.href = parsed.href;
                          siteEl.textContent = parsed.href.replace(/^https?:\/\//, '').replace(/\/$/, '');
                          siteEl.target = '_blank';
                          siteEl.rel = 'noopener noreferrer';
                          siteEl.style.cssText = 'color:#c0392b;text-decoration:none;font-weight:600;font-size:0.9em';
                          document.getElementById('contact-website').appendChild(makeRow('Website', siteEl));
                      }
                  } catch (_) {}
              }

              // Opening hours — OSM only
              if (r.osmOpeningHours) {
                  var hoursEl = document.createElement('span');
                  hoursEl.style.fontSize = '0.9em';
                  hoursEl.textContent = r.osmOpeningHours;
                  document.getElementById('contact-hours').appendChild(makeRow('Hours', hoursEl));
              }
          })(r);
          var currentId = window.location.pathname.split('/').pop();
          loadNearby(r.latitude, r.longitude, currentId);

          // Bookmark toggle state (only if logged in)
          if (localStorage.getItem('accessToken')) {
            fetchWithAuth('/api/users/me/bookmarks')
              .then(bResp => bResp ? bResp.json() : null)
              .then(bData => {
                if (bData && bData.status === 'success') {
                  const rid = r.restaurantId;
                  const isSaved = (bData.data || []).some(b => b.restaurantId === rid);
                  updateBookmarkBtn(isSaved);
                }
              })
              .catch(() => {});
          }
        })
        .catch(e => {
          showToast('Could not load restaurant details', 'error');
          document.getElementById("header-card").innerHTML = '<p style="color:#888;padding:24px;text-align:center">Restaurant data unavailable</p>';
        });
    </script>
  </body>
</html>
