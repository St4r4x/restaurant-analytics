<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiche Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }
      .container { max-width: 1100px; margin: 0 auto; }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-size: 0.9em;
      }
      .back-link:hover { color: white; }

      /* Header card */
      .header-card {
        background: white;
        border-radius: 12px;
        padding: 24px 28px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        margin-bottom: 20px;
        display: flex;
        align-items: flex-start;
        gap: 20px;
        flex-wrap: wrap;
      }
      .header-info { flex: 1; min-width: 200px; }
      .restaurant-name { font-size: 1.8em; font-weight: 700; color: #333; margin-bottom: 6px; }
      .restaurant-meta { font-size: 0.95em; color: #666; margin-bottom: 4px; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px;
        border-radius: 24px;
        font-weight: 700;
        font-size: 1.1em;
        margin-top: 10px;
      }
      .badge-green  { background: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; }
      .badge-yellow { background: #fff8e1; color: #f57f17; border: 2px solid #ffc107; }
      .badge-orange { background: #fff3e0; color: #e65100; border: 2px solid #ff9800; }
      .badge-red    { background: #ffebee; color: #b71c1c; border: 2px solid #f44336; }

      .trend-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.8em;
        font-weight: 600;
        margin-left: 8px;
      }
      .trend-improving { background: #e8f5e9; color: #2e7d32; }
      .trend-worsening { background: #ffebee; color: #b71c1c; }
      .trend-stable    { background: #f5f5f5; color: #757575; }

      /* Grid */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

      .card {
        background: white;
        border-radius: 12px;
        padding: 22px 24px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      }
      .card h2 {
        color: #667eea;
        font-size: 1.1em;
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 3px solid #667eea;
      }

      #map { width: 100%; height: 260px; border-radius: 8px; }

      /* Score chart */
      .chart-wrapper { height: 220px; position: relative; }

      /* Inspections table */
      .full-width { margin-bottom: 20px; }
      table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
      th {
        background: #667eea;
        color: white;
        padding: 10px 12px;
        text-align: left;
        font-weight: 600;
      }
      td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
      tr:hover td { background: #f8f9ff; }
      .grade-a { color: #2e7d32; font-weight: 700; }
      .grade-b { color: #f57f17; font-weight: 700; }
      .grade-c { color: #e65100; font-weight: 700; }
      .grade-bad { color: #b71c1c; font-weight: 700; }
      .critical-yes { color: #c62828; font-weight: 600; font-size: 0.85em; }
      .critical-no  { color: #aaa; font-size: 0.85em; }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 30px; height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      .error { background: #fee; color: #c33; padding: 12px; border-radius: 6px; border-left: 4px solid #c33; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .no-location {
        background: #f5f5f5;
        border-radius: 8px;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #aaa;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/" class="back-link">← Dashboard</a>

      <div id="header-card" class="header-card">
        <div class="spinner"></div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h2>Localisation</h2>
          <div id="map-container"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h2>Evolution du score</h2>
          <div class="chart-wrapper">
            <canvas id="score-chart"></canvas>
          </div>
        </div>
      </div>

      <div class="card full-width">
        <h2>Historique des inspections</h2>
        <div id="inspections-table"><div class="spinner"></div></div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("accessToken");
      if (!token) window.location.href = "/login";

      const restaurantId = window.location.pathname.split("/").filter(Boolean).pop();

      function getAuthHeaders() {
        return { "Content-Type": "application/json", Authorization: "Bearer " + token };
      }

      function gradeClass(g) {
        if (g === "A") return "grade-a";
        if (g === "B") return "grade-b";
        if (g === "C") return "grade-c";
        return "grade-bad";
      }

      function formatDate(d) {
        if (!d) return "—";
        return d.substring(0, 10);
      }

      function renderHeader(r) {
        const addr = r.address
          ? [r.address.building, r.address.street, r.address.zipcode].filter(Boolean).join(" ")
          : "";
        const badgeColor = r.badgeColor || "red";
        const trend = r.trend || "stable";
        const latestGrade = r.latestGrade || "N/A";
        const latestScore = r.latestScore != null ? r.latestScore : "—";

        const trendLabel = { improving: "↑ En amélioration", stable: "→ Stable", worsening: "↓ En dégradation" };
        const trendClass = { improving: "trend-improving", stable: "trend-stable", worsening: "trend-worsening" };

        document.getElementById("header-card").innerHTML = `
          <div class="header-info">
            <div class="restaurant-name">${r.name || "—"}</div>
            <div class="restaurant-meta">${r.borough || ""} · ${r.cuisine || ""}</div>
            ${addr ? `<div class="restaurant-meta" style="font-size:0.85em;color:#999">${addr}</div>` : ""}
            <div class="badge badge-${badgeColor}">
              Note ${latestGrade}
              <span style="font-weight:400;font-size:0.85em">Score ${latestScore}</span>
            </div>
            <span class="trend-badge ${trendClass[trend]}">${trendLabel[trend] || trend}</span>
          </div>
        `;
        document.title = `${r.name} — Fiche Restaurant`;
      }

      function renderMap(r) {
        const container = document.getElementById("map-container");
        if (!r.latitude || !r.longitude) {
          container.innerHTML = '<div class="no-location">Coordonnées GPS non disponibles</div>';
          return;
        }
        container.innerHTML = '<div id="map"></div>';
        const map = L.map("map").setView([r.latitude, r.longitude], 16);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors", maxZoom: 18
        }).addTo(map);
        const addr = r.address
          ? [r.address.building, r.address.street, r.address.zipcode].filter(Boolean).join(" ")
          : "";
        L.marker([r.latitude, r.longitude])
          .addTo(map)
          .bindPopup(`<strong>${r.name}</strong>${addr ? "<br>" + addr : ""}`)
          .openPopup();
      }

      function renderScoreChart(grades) {
        const sorted = (grades || [])
          .filter(g => g.date && g.score != null)
          .sort((a, b) => a.date.localeCompare(b.date));

        if (sorted.length === 0) {
          document.getElementById("score-chart").parentElement.innerHTML =
            '<p style="color:#aaa;font-size:0.9em;padding:20px 0">Aucune donnée de score disponible</p>';
          return;
        }

        new Chart(document.getElementById("score-chart"), {
          type: "line",
          data: {
            labels: sorted.map(g => g.date.substring(0, 10)),
            datasets: [{
              label: "Score inspection",
              data: sorted.map(g => g.score),
              borderColor: "#667eea",
              backgroundColor: "rgba(102,126,234,0.1)",
              tension: 0.3,
              fill: true,
              pointRadius: 4,
              pointBackgroundColor: "#667eea"
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                beginAtZero: true,
                title: { display: true, text: "Score (bas = mieux)" },
                grid: { color: "#f0f0f0" }
              },
              x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } }
            }
          }
        });
      }

      function renderInspections(grades) {
        const container = document.getElementById("inspections-table");
        if (!grades || grades.length === 0) {
          container.innerHTML = '<p style="color:#aaa;padding:10px">Aucune inspection enregistrée</p>';
          return;
        }
        const sorted = [...grades].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
        let html = `<div style="overflow-x:auto"><table>
          <thead><tr>
            <th>Date</th><th>Note</th><th>Score</th><th>Type inspection</th>
            <th>Critique</th><th>Code violation</th><th>Description</th>
          </tr></thead><tbody>`;
        sorted.forEach(g => {
          const gc = gradeClass(g.grade);
          const crit = g.criticalFlag === "Critical" || g.criticalFlag === "Y";
          html += `<tr>
            <td>${formatDate(g.date)}</td>
            <td><span class="${gc}">${g.grade || "—"}</span></td>
            <td>${g.score != null ? g.score : "—"}</td>
            <td style="font-size:0.85em;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.inspectionType || "—"}</td>
            <td><span class="${crit ? "critical-yes" : "critical-no"}">${crit ? "⚠ Oui" : "Non"}</span></td>
            <td style="font-family:monospace;font-size:0.85em">${g.violationCode || "—"}</td>
            <td style="font-size:0.82em;max-width:260px">${g.violationDescription || "—"}</td>
          </tr>`;
        });
        html += "</tbody></table></div>";
        container.innerHTML = html;
      }

      fetch(`/api/restaurants/${restaurantId}`, { headers: getAuthHeaders() })
        .then(r => {
          if (r.status === 401 || r.status === 403) { window.location.href = "/login"; throw new Error("auth"); }
          return r.json();
        })
        .then(resp => {
          if (resp.status !== "success") {
            document.getElementById("header-card").innerHTML = `<div class="error">${resp.message}</div>`;
            return;
          }
          const r = resp.data;
          renderHeader(r);
          renderMap(r);
          renderScoreChart(r.grades);
          renderInspections(r.grades);
        })
        .catch(e => {
          if (e.message !== "auth")
            document.getElementById("header-card").innerHTML = `<div class="error">Erreur: ${e.message}</div>`;
        });
    </script>
  </body>
</html>
