# Spring Boot Configuration
spring.application.name=restaurant-analyzer

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.st4r4x=DEBUG

# Exclude Spring Boot MongoDB auto-config — we use raw MongoClientFactory, not Spring Data MongoDB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# MongoDB Configuration
mongodb.uri=mongodb://mongodb:27017
mongodb.database=newyork
mongodb.collection=restaurants

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/restaurantdb
spring.datasource.username=restaurant
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:restaurant}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT Configuration
# jwt.secret — set JWT_SECRET environment variable (minimum 32 chars)
# Generate a secure value: openssl rand -hex 32
jwt.access.expiration.ms=900000
jwt.refresh.expiration.ms=604800000

# Application Configuration
app.name=Restaurant Analytics
app.version=1.0-SNAPSHOT

# NYC Open Data API (Phase 1)
nyc.api.url=https://data.cityofnewyork.us/resource/43nn-pn8j.json
nyc.api.app_token=
nyc.api.page-size=1000
# Max records to fetch (0 = unlimited, use a small value for local testing)
nyc.api.max_records=0

# Scheduling
spring.task.scheduling.pool.size=2

# Redis (Phase 2)
redis.host=localhost
redis.port=6379
redis.cache.ttl-seconds=3600
redis.top.limit=10

# Swagger / OpenAPI (Spring Boot 2.6 compatibility)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Rate limiting — auth endpoints (/api/auth/**)
# ENV: AUTH_RATE_LIMIT_REQUESTS, AUTH_RATE_LIMIT_WINDOW_MINUTES
auth.rate-limit.requests=10
auth.rate-limit.window-minutes=1

# Admin signup code (leave empty to disable — admin accounts seeded via DataSeeder)
# ENV: ADMIN_SIGNUP_CODE
admin.signup.code=

# Photo uploads (Phase 2)
# ENV: APP_UPLOADS_DIR
app.uploads.dir=/app/uploads
