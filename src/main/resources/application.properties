# Spring Boot Configuration
spring.application.name=restaurant-analyzer

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.st4r4x=DEBUG

# MongoDB Configuration
mongodb.uri=mongodb://mongodb:27017
mongodb.database=newyork
mongodb.collection=restaurants

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/restaurantdb
spring.datasource.username=restaurant
spring.datasource.password=restaurant
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=a_very_long_32_bytes_minimum_secret_with_extra_chars_123456
jwt.access.expiration.ms=900000
jwt.refresh.expiration.ms=604800000

# Application Configuration
app.name=Restaurant Analytics
app.version=1.0-SNAPSHOT

# NYC Open Data API (Phase 1)
nyc.api.url=https://data.cityofnewyork.us/resource/43nn-pn8j.json
nyc.api.app_token=
nyc.api.page-size=1000
# Max records to fetch (0 = unlimited, use a small value for local testing)
nyc.api.max_records=0

# Scheduling
spring.task.scheduling.pool.size=2

# Redis (Phase 2)
redis.host=localhost
redis.port=6379
redis.cache.ttl-seconds=3600
redis.top.limit=10

# Swagger / OpenAPI (Spring Boot 2.6 compatibility)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Rate limiting — auth endpoints (/api/auth/**)
# ENV: AUTH_RATE_LIMIT_REQUESTS, AUTH_RATE_LIMIT_WINDOW_MINUTES
auth.rate-limit.requests=10
auth.rate-limit.window-minutes=1

# Admin signup code (leave empty to disable — admin accounts seeded via DataSeeder)
# ENV: ADMIN_SIGNUP_CODE
admin.signup.code=

# Photo uploads (Phase 2)
# ENV: APP_UPLOADS_DIR
app.uploads.dir=/app/uploads

# Rate limiting — restaurant endpoints (/api/restaurants/**)
# ENV: RESTAURANT_RATE_LIMIT_REQUESTS, RESTAURANT_RATE_LIMIT_WINDOW_MINUTES
restaurant.rate-limit.requests=100
restaurant.rate-limit.window-minutes=1

# Reverse proxy / HTTPS support (SEC-07)
# Enables ForwardedHeaderFilter so the app sees the real client IP and protocol
# when running behind nginx or a cloud load balancer.
# NOTE: server.forward-headers-strategy=native is verified by static file check only
# (grep on application.properties). Behavioral confirmation that ForwardedHeaderFilter
# correctly reads X-Forwarded-For at runtime requires a reverse-proxy harness and is
# explicitly accepted as manual-only per CONTEXT.md scope — deferred to Phase 18 E2E
# infrastructure. The ROADMAP success criterion "HTTPS-ready config" is therefore met
# by configuration presence; runtime verification is out of scope for this phase.
server.forward-headers-strategy=native
