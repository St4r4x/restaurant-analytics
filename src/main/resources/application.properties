# Spring Boot Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.st4r4x=DEBUG

# Disable Spring whitelabel error page — custom templates in templates/error/ are used instead
server.error.whitelabel.enabled=false

# MongoDB Configuration
mongodb.uri=mongodb://localhost:27017
mongodb.database=newyork
mongodb.collection=restaurants

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurantdb
spring.datasource.username=restaurant
# SECURITY: use SPRING_DATASOURCE_PASSWORD env var in production — never hardcode
spring.datasource.password=restaurant
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# SECURITY: keep false in production — enabling this leaks query structure in logs
spring.jpa.show-sql=false

# JWT Configuration
# SECURITY: jwt.secret MUST be injected via JWT_SECRET env var in production — never hardcode here
# Dev fallback — only active when JWT_SECRET env var is not set (local runs without Docker)
jwt.secret=dev-only-insecure-key-replace-with-JWT_SECRET-env-var-in-prod
jwt.access.expiration.ms=900000
jwt.refresh.expiration.ms=604800000

# NYC Open Data API (Phase 1)
nyc.api.url=https://data.cityofnewyork.us/resource/43nn-pn8j.json
nyc.api.app_token=
nyc.api.page-size=1000
# Max records to fetch (0 = unlimited, use a small value for local testing)
nyc.api.max_records=0

# Scheduling
spring.task.scheduling.pool.size=2

# Redis (Phase 2)
redis.host=localhost
redis.port=6379
redis.cache.ttl-seconds=3600
# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Rate limiting — auth endpoints (/api/auth/**)
# ENV: AUTH_RATE_LIMIT_REQUESTS, AUTH_RATE_LIMIT_WINDOW_MINUTES
auth.rate-limit.requests=10
auth.rate-limit.window-minutes=1

# Admin signup code (leave empty to disable — admin accounts seeded via DataSeeder)
# ENV: ADMIN_SIGNUP_CODE
admin.signup.code=

# Photo uploads (Phase 2)
# ENV: APP_UPLOADS_DIR
app.uploads.dir=/app/uploads
