# Spring Boot Configuration
spring.application.name=restaurant-analyzer

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.aflokkat=DEBUG

# MongoDB Configuration
mongodb.uri=mongodb://localhost:27017
mongodb.database=newyork
mongodb.collection=restaurants

# Application Configuration
app.name=Restaurant Analytics
app.version=1.0-SNAPSHOT

# NYC Open Data API (Phase 1)
nyc.api.url=https://data.cityofnewyork.us/resource/43nn-pn8j.json
nyc.api.token=${NYC_API_APP_TOKEN:}
nyc.api.page-size=1000

# Scheduling
spring.task.scheduling.pool.size=2
