name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build (skip tests)
        run: mvn clean package -DskipTests
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  unit-test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run unit tests
        run: mvn test
      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-html
          path: target/site/jacoco/
          retention-days: 7
      - name: JaCoCo coverage comment
        if: github.event_name == 'pull_request'
        uses: PavanMudigonda/jacoco-reporter@v5.1
        with:
          coverage_results_path: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          coverage_report_title: 'Coverage Report'
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  integration-test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: nyc-restaurant-hygiene-z-qd-p
          env-slug: dev
          export-type: env
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run integration tests
        env:
          NYC_API_MAX_RECORDS: "200"
        run: mvn test-compile failsafe:integration-test failsafe:verify

  e2e:
    name: E2E Smoke Test
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: nyc-restaurant-hygiene-z-qd-p
          env-slug: dev
          export-type: env
      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target/
      - name: Build application image
        run: docker compose build --build-arg GIT_SHA=${{ github.sha }} app
      - name: Start application stack
        env:
          NYC_API_MAX_RECORDS: "200"
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: docker compose up -d --wait --wait-timeout 300
      - name: Dump app logs on failure
        if: failure()
        run: docker compose logs app
      - name: Health check
        run: curl --fail --retry 10 --retry-delay 5 http://localhost:8080/api/restaurants/health
      - name: Tear down stack
        if: always()
        run: docker compose down -v

  docker:
    name: Docker Build and Push
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/st4r4x/restaurant-analytics
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
