services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-app
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: newyork
      MONGODB_COLLECTION: restaurants
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_UPLOADS_DIR: /app/uploads
      # Secrets injected from .env (never hardcoded — D-05)
      JWT_SECRET: ${JWT_SECRET}
      CONTROLLER_SIGNUP_CODE: ${CONTROLLER_SIGNUP_CODE:-}
      ADMIN_SIGNUP_CODE: ${ADMIN_SIGNUP_CODE:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurantdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-restaurant}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - restaurant-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8080/api/restaurants/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    networks:
      - restaurant-network
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: newyork
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - restaurant-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    networks:
      - restaurant-network
    ports:
      - "5432:5432"
    environment:
      # Credentials injected from .env (never hardcoded — D-05)
      POSTGRES_USER: ${POSTGRES_USER:-restaurant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-restaurantdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restaurant} -d ${POSTGRES_DB:-restaurantdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  restaurant-network:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data:
  uploads_data:
