services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-app
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: newyork
      MONGODB_COLLECTION: restaurants
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped
    networks:
      - restaurant-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8080/api/restaurants/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    networks:
      - restaurant-network
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: newyork
    volumes:
      - mongodb_data:/data/db
      - ./init-restaurants.js:/docker-entrypoint-initdb.d/init-restaurants.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - restaurant-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    networks:
      - restaurant-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant
      POSTGRES_DB: restaurantdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurantdb"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  restaurant-network:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data:
